<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ My Smart Tasks - Smart To-Do List with Reminders</title>
    <meta name="description" content="A beautiful, smart to-do list app with browser notifications and reminders. Stay organized and never miss a deadline.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="app-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3l1.912 5.813a2 2 0 001.898 1.375h6.11l-4.944 3.594a2 2 0 00-.727 2.237l1.912 5.813-4.944-3.594a2 2 0 00-2.354 0l-4.944 3.594 1.912-5.813a2 2 0 00-.727-2.237L2.08 10.188h6.11a2 2 0 001.898-1.375L12 3z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="app-title">✨ My Smart Tasks</h1>
                        <p class="app-subtitle">Stay organized, stay productive</p>
                    </div>
                </div>
                <button id="themeToggle" class="theme-toggle">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-header">
                <span id="progressText">0% Complete</span>
                <span id="taskCount">0 tasks</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>

        <!-- Active Tasks -->
        <div class="tasks-section">
            <h2 class="section-title">Active Tasks</h2>
            <div id="activeTasks" class="tasks-grid"></div>
            <div id="emptyState" class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                <p>No tasks yet! Click the + button to add your first task.</p>
            </div>
        </div>

        <!-- Completed Tasks -->
        <div class="tasks-section">
            <div class="section-header">
                <h2 class="section-title">Completed</h2>
                <button id="clearCompleted" class="clear-btn" style="display: none;">Clear Completed</button>
            </div>
            <div id="completedTasks" class="tasks-grid"></div>
        </div>

        <!-- Add Task Button -->
        <button id="addTaskBtn" class="add-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Task</h3>
                <button id="closeModal" class="close-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Title *</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Add details about this task" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDue">Due Date & Time *</label>
                        <input type="datetime-local" id="taskDue" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" id="submitBtn" class="btn-primary">Add Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirmDialog" class="modal">
        <div class="modal-content confirm-dialog">
            <h3>Clear Completed Tasks?</h3>
            <p>This will permanently remove all completed tasks. This action cannot be undone.</p>
            <div class="form-actions">
                <button id="confirmCancel" class="btn-secondary">Cancel</button>
                <button id="confirmDelete" class="btn-danger">Clear All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
